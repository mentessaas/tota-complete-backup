<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Tota Office - Oficina Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-medium: #16213e;
            --bg-light: #0f3460;
            --accent-primary: #e94560;
            --accent-secondary: #f39c12;
            --accent-tertiary: #6c5ce7;
            --text-primary: #ffffff;
            --text-secondary: #bdc3c7;
            --text-muted: #7f8c8d;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            grid-template-rows: 70px 1fr;
            height: 100vh;
            gap: 0;
        }
        
        /* Header estilo moderno */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(180deg, rgba(15, 52, 96, 0.9), rgba(22, 33, 62, 0.95));
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            font-size: 2em;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .logo-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9em;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }
        
        .header-info {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            font-size: 0.95em;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: var(--danger); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        /* Canvas Area */
        .game-area {
            position: relative;
            background: #0a0a12;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #officeCanvas {
            display: block;
            image-rendering: pixelated;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.2);
        }
        
        /* Sidebar moderno estilo glassmorphism */
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Tabs estilo pills */
        .tabs {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .tab span {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.85em;
            display: none;
        }
        
        @media (min-width: 900px) {
            .tab span { display: inline; }
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            border-color: transparent;
        }
        
        /* Panel Content */
        .panel {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 15px;
        }
        
        .panel.active {
            display: flex;
        }
        
        /* Chat Panel */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
            position: relative;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.system {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(243, 156, 18, 0.1));
            border-left: 4px solid var(--accent-primary);
        }
        
        .message.user {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(116, 185, 255, 0.1));
            border-left: 4px solid #3498db;
        }
        
        .message.agent {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.2), rgba(129, 236, 236, 0.1));
            border-left: 4px solid var(--success);
        }
        
        .message.direct {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.25), rgba(178, 190, 195, 0.1));
            border-left: 4px solid var(--accent-tertiary);
        }
        
        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .msg-sender {
            font-weight: 700;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .msg-sender .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }
        
        .msg-time {
            font-size: 0.75em;
            color: var(--text-muted);
        }
        
        .msg-text {
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        /* Chat Input */
        .chat-input-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
        }
        
        .chat-input-area select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: rgba(15, 52, 96, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95em;
            cursor: pointer;
        }
        
        .chat-input-area select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .chat-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 52, 96, 0.5);
            color: var(--text-primary);
            border: 2px solid transparent;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        /* Agents Panel */
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .agent-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .agent-card:hover {
            transform: translateX(5px);
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.1), rgba(255, 255, 255, 0.05));
        }
        
        .agent-card:hover::before {
            opacity: 1;
        }
        
        .agent-card.selected {
            border-color: var(--accent-secondary);
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.15), rgba(255, 255, 255, 0.05));
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .agent-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 3px;
        }
        
        .agent-role {
            font-size: 0.85em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-badge.working { background: rgba(243, 156, 18, 0.2); color: var(--warning); }
        .status-badge.idle { background: rgba(127, 140, 141, 0.2); color: var(--text-muted); }
        .status-badge.thinking { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .status-badge.walking { background: rgba(46, 204, 113, 0.2); color: var(--success); }
        
        .agent-task {
            font-size: 0.9em;
            color: var(--text-secondary);
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-top: 8px;
        }
        
        .agent-energy {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        
        .energy-bar {
            flex: 1;
            height: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .energy-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .agent-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        
        .skill-tag {
            padding: 4px 10px;
            background: rgba(108, 92, 231, 0.2);
            border-radius: 12px;
            font-size: 0.75em;
            color: var(--accent-tertiary);
            font-weight: 600;
        }
        
        /* Tasks Panel */
        .tasks-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .task-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent-secondary);
            transition: all 0.3s;
        }
        
        .task-card:hover {
            transform: translateX(3px);
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.1), rgba(255, 255, 255, 0.05));
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .task-title {
            font-weight: 700;
            color: var(--accent-secondary);
        }
        
        .task-status {
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.75em;
            font-weight: 600;
        }
        
        .task-status.pending { background: rgba(243, 156, 18, 0.2); color: var(--warning); }
        .task-status.completed { background: rgba(46, 204, 113, 0.2); color: var(--success); }
        
        .task-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .task-assignee {
            font-size: 0.85em;
            color: var(--accent-tertiary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .task-create {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
        }
        
        .task-create input, 
        .task-create textarea,
        .task-create select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(15, 52, 96, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95em;
        }
        
        .task-create input:focus,
        .task-create textarea:focus,
        .task-create select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .task-create button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .task-create button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: linear-gradient(180deg, var(--bg-medium), var(--bg-dark));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .modal-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }
        
        .modal-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--accent-secondary);
        }
        
        .modal-role {
            font-size: 1em;
            color: var(--accent-tertiary);
            font-weight: 600;
        }
        
        .modal-desc {
            font-size: 1em;
            line-height: 1.6;
            margin: 15px 0;
            color: var(--text-secondary);
        }
        
        .modal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s;
        }
        
        .modal-close:hover {
            color: var(--accent-primary);
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .modal-btn.chat {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .modal-btn.meet {
            background: linear-gradient(135deg, var(--accent-tertiary), #8e44ad);
            color: white;
        }
        
        .modal-btn.task {
            background: linear-gradient(135deg, var(--accent-secondary), #e67e22);
            color: white;
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* Notifications */
        .notification {
            position: fixed;
            top: 90px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            animation: slideInRight 0.4s ease, fadeOut 0.4s ease 2.6s forwards;
            z-index: 999;
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.4);
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }
        
        /* Scrollbar global */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                <span class="logo-text">TOTA OFFICE</span>
            </div>
            <div class="header-info">
                <div class="status-item">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="wsStatus">Conectando...</span>
                </div>
                <div class="status-item">
                    <span>👥</span>
                    <span id="userCount">1</span>
                </div>
                <div class="status-item">
                    <span>🕐</span>
                    <span id="clock">00:00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Game Canvas -->
        <div class="game-area">
            <canvas id="officeCanvas"></canvas>
        </div>
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="tabs">
                <div class="tab active" data-panel="chat">
                    <span>💬</span><span>Chat</span>
                </div>
                <div class="tab" data-panel="agents">
                    <span>🤖</span><span>Agentes</span>
                </div>
                <div class="tab" data-panel="tasks">
                    <span>📋</span><span>Tareas</span>
                </div>
            </div>
            
            <!-- Chat Panel -->
            <div class="panel active" id="panel-chat">
                <div class="chat-messages" id="chatMessages">
                    <div class="message system">
                        <div class="msg-text">🏢 ¡Bienvenido a Tota Office! Haz click en un agente para ver sus detalles o envía un mensaje.</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <select id="recipientSelect">
                        <option value="">📢 Chat Global</option>
                    </select>
                    <input type="text" class="chat-input" id="chatInput" placeholder="Escribe un mensaje...">
                </div>
            </div>
            
            <!-- Agents Panel -->
            <div class="panel" id="panel-agents">
                <div class="agent-list" id="agentList"></div>
            </div>
            
            <!-- Tasks Panel -->
            <div class="panel" id="panel-tasks">
                <div class="tasks-list" id="tasksList"></div>
                <div class="task-create">
                    <input type="text" id="taskTitle" placeholder="Título de la tarea...">
                    <textarea id="taskDesc" placeholder="Descripción..." rows="2"></textarea>
                    <select id="taskAssignee">
                        <option value="">Seleccionar agente...</option>
                    </select>
                    <button onclick="createTask()">➕ Crear Tarea</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Agent Detail Modal -->
    <div class="modal" id="agentModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">✕</span>
            <div class="modal-header">
                <div class="modal-avatar" id="modalEmoji">🦊</div>
                <div>
                    <div class="modal-title" id="modalName">Tota</div>
                    <div class="modal-role" id="modalRole">Orquestador</div>
                </div>
            </div>
            <div class="modal-desc" id="modalDesc">Descripción del agente...</div>
            <div class="modal-stats">
                <div class="stat-box">
                    <div class="stat-label">Estado</div>
                    <div class="stat-value" id="modalStatus">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Energía</div>
                    <div class="stat-value" id="modalEnergy">-</div>
                </div>
            </div>
            <div class="agent-skills" id="modalSkills"></div>
            <div class="modal-actions">
                <button class="modal-btn chat" onclick="openChatWithAgent()">💬 Chat</button>
                <button class="modal-btn meet" onclick="inviteToMeeting()">🤝 Reunión</button>
                <button class="modal-btn task" onclick="assignTaskFromModal()">📋 Tarea</button>
            </div>
        </div>
    </div>

    <script src="sprites.js"></script>
    <script src="game.js"></script>
    <script>
        // ==================== GAME STATE ====================
        let ws = null;
        let agents = {};
        let areas = {};
        let messages = [];
        let tasks = {};
        let selectedAgent = null;
        let currentAgentDetails = null;

        // ==================== WEBSOCKET ====================
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8765');
            
            ws.onopen = () => {
                document.getElementById('wsStatus').textContent = 'Conectado';
                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusDot').classList.remove('offline');
            };
            
            ws.onclose = () => {
                document.getElementById('wsStatus').textContent = 'Desconectado';
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusDot').classList.remove('online');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = () => {
                document.getElementById('wsStatus').textContent = 'Error';
                document.getElementById('statusDot').classList.add('offline');
            };
            
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };
        }
        
        function handleMessage(msg) {
            switch (msg.type) {
                case 'init':
                    agents = msg.data.agents;
                    areas = msg.data.areas;
                    messages = msg.data.messages;
                    tasks = msg.data.tasks;
                    
                    // Inicializar juego
                    if (window.getGame) {
                        const game = window.getGame();
                        if (game) {
                            game.updateState(msg.data);
                            game.connect(ws);
                        }
                    }
                    
                    updateAgentList();
                    updateTasksList();
                    updateRecipientSelect();
                    break;
                    
                case 'message':
                    messages.push(msg.data);
                    addChatMessage(msg.data);
                    break;
                    
                case 'agent_move':
                    const agent = agents[msg.data.agent_id];
                    if (agent) {
                        agent.x = msg.data.x;
                        agent.y = msg.data.y;
                        agent.status = 'walking';
                        
                        // Después de un tiempo, volver a idle
                        setTimeout(() => {
                            if (agents[msg.data.agent_id]) {
                                agents[msg.data.agent_id].status = 'idle';
                            }
                        }, 2000);
                    }
                    break;
                    
                case 'agent_update':
                    agents[msg.data.id] = msg.data;
                    updateAgentList();
                    break;
                    
                case 'task_created':
                    tasks[msg.data.id] = msg.data;
                    updateTasksList();
                    showNotification(`📋 Nueva tarea: ${msg.data.title}`);
                    break;
                    
                case 'system':
                    addSystemMessage(msg.text);
                    break;
                    
                case 'agent_details':
                    showAgentModal(msg.data);
                    break;
            }
        }

        // ==================== UI UPDATES ====================
        function updateAgentList() {
            const container = document.getElementById('agentList');
            container.innerHTML = '';
            
            Object.values(agents).forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.onclick = () => {
                    selectedAgent = agent;
                    showAgentModal(agent);
                    updateAgentList();
                };
                
                const energyColor = agent.energy > 50 ? '#2ecc71' : agent.energy > 25 ? '#f39c12' : '#e74c3c';
                
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.emoji}</div>
                        <div class="agent-info">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                    </div>
                    <div class="agent-status">
                        <span class="status-badge ${agent.status}">${agent.status}</span>
                        <span>${agent.task}</span>
                    </div>
                    <div class="agent-energy">
                        <div class="energy-bar">
                            <div class="energy-fill" style="width: ${agent.energy || 100}%; background: ${energyColor}"></div>
                        </div>
                        <span style="font-size: 0.8em; color: ${energyColor}">${agent.energy || 100}%</span>
                    </div>
                    <div class="agent-task">${agent.description}</div>
                    <div class="agent-skills">
                        ${(agent.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('')}
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            updateRecipientSelect();
        }
        
        function updateTasksList() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            
            Object.values(tasks).forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                        <div class="task-status ${task.status}">${task.status}</div>
                    </div>
                    <div class="task-desc">${task.description || 'Sin descripción'}</div>
                    <div class="task-assignee">👤 Asignado a: ${task.assignee ? agents[task.assignee]?.name || task.assignee : 'Sin asignar'}</div>
                `;
                container.appendChild(card);
            });
        }
        
        function updateRecipientSelect() {
            const select = document.getElementById('recipientSelect');
            const taskSelect = document.getElementById('taskAssignee');
            
            const currentValue = select.value;
            const currentTaskValue = taskSelect.value;
            
            select.innerHTML = '<option value="">📢 Chat Global</option>';
            taskSelect.innerHTML = '<option value="">Seleccionar agente...</option>';
            
            Object.values(agents).forEach(agent => {
                select.innerHTML += `<option value="${agent.id}">💬 ${agent.emoji} ${agent.name}</option>`;
                taskSelect.innerHTML += `<option value="${agent.id}">${agent.emoji} ${agent.name}</option>`;
            });
            
            select.value = currentValue;
            taskSelect.value = currentTaskValue;
        }
        
        function addChatMessage(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            
            let msgClass = 'user';
            let avatar = '👤';
            
            if (msg.sender === 'system' || msg.sender_name === 'Sistema') {
                msgClass = 'system';
                avatar = '🏢';
            } else if (agents[msg.sender]) {
                msgClass = msg.recipient === 'user' ? 'direct' : 'agent';
                avatar = agents[msg.sender].emoji;
            }
            
            const time = new Date(msg.timestamp).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            const senderName = msg.sender_name || (agents[msg.sender] ? agents[msg.sender].name : msg.sender);
            
            div.className = `message ${msgClass}`;
            div.innerHTML = `
                <div class="msg-header">
                    <div class="msg-sender">
                        <span class="avatar">${avatar}</span>
                        ${senderName}
                        ${msg.recipient && msg.recipient !== 'user' ? '→ ' + (agents[msg.recipient]?.name || msg.recipient) : ''}
                    </div>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-text">${msg.text}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `<div class="msg-text">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ==================== MODAL ====================
        function showAgentModal(agent) {
            currentAgentDetails = agent;
            
            document.getElementById('modalEmoji').textContent = agent.emoji;
            document.getElementById('modalName').textContent = agent.name;
            document.getElementById('modalRole').textContent = agent.role;
            document.getElementById('modalDesc').textContent = agent.description;
            document.getElementById('modalStatus').textContent = agent.status;
            document.getElementById('modalEnergy').textContent = (agent.energy || 100) + '%';
            
            const skillsContainer = document.getElementById('modalSkills');
            skillsContainer.innerHTML = (agent.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
            
            document.getElementById('agentModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('agentModal').classList.remove('active');
        }
        
        function openChatWithAgent() {
            if (currentAgentDetails) {
                document.getElementById('recipientSelect').value = currentAgentDetails.id;
                document.querySelector('[data-panel="chat"]').click();
                document.getElementById('chatInput').focus();
            }
            closeModal();
        }
        
        function inviteToMeeting() {
            if (currentAgentDetails && ws) {
                ws.send(JSON.stringify({
                    type: 'meet',
                    data: { agent_id: currentAgentDetails.id }
                }));
            }
            closeModal();
        }
        
        function assignTaskFromModal() {
            if (currentAgentDetails) {
                document.getElementById('taskAssignee').value = currentAgentDetails.id;
                document.querySelector('[data-panel="tasks"]').click();
                document.getElementById('taskTitle').focus();
            }
            closeModal();
        }

        // ==================== ACTIONS ====================
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            const recipient = document.getElementById('recipientSelect').value;
            
            if (text && ws) {
                ws.send(JSON.stringify({
                    type: 'message',
                    data: {
                        sender: 'user',
                        text: text,
                        recipient: recipient || null
                    }
                }));
                input.value = '';
            }
        }
        
        function createTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const assignee = document.getElementById('taskAssignee').value;
            
            if (title && ws) {
                ws.send(JSON.stringify({
                    type: 'task',
                    data: {
                        title: title,
                        description: desc,
                        assignee: assignee || null
                    }
                }));
                
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
            }
        }
        
        function showNotification(text) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.remove();
            }, 3000);
        }

        // ==================== EVENTS ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
            });
        });

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('agentModal').addEventListener('click', (e) => {
            if (e.target.id === 'agentModal') closeModal();
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-ES');
        }, 1000);

        // ==================== INIT ====================
        window.addEventListener('load', () => {
            initGame();
            connectWebSocket();
        });
    </script>
</body>
</html>
